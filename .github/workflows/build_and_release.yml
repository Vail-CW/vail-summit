name: Build and Release Summit Firmware

# Builds the Vail Summit firmware and (optionally) publishes a GitHub release.
# Lives in vail-summit so the default GITHUB_TOKEN can create releases on this
# repo without needing a cross-repo PAT.
#
# The Summit flasher at update.vailadapter.com reads its dropdown from this
# repo's GitHub Releases via the API:
#   - Latest entry  = most recent release with prerelease=false
#   - Test Release  = most recent release with prerelease=true
#
# release_type input controls what this workflow publishes:
#   prerelease : creates a pre-release (becomes the Test Release in dropdown)
#   release    : creates a stable release (becomes Latest in dropdown)
#   none       : build only, attach artifacts to the workflow run, no release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'What to publish'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease   # Test channel: shows up as "Test Release" in flasher
          - release      # Stable: shows up as "Latest" in flasher
          - none         # Build only, no release
      release_title:
        description: 'Release title (defaults to vX.YZ - <FIRMWARE_VERSION>)'
        required: false
        type: string
      release_notes:
        description: "Release body markdown. If empty, a minimal template is used. For full notes, edit the release after it's created."
        required: false
        type: string

# Pinned to match the local C:\acli build environment. Update versions here AND
# in the local arduino-cli/user/libraries/ together so CI and local stay in sync.
env:
  ESP32_CORE_VERSION: "2.0.14"
  LIB_LOVYANGFX: "1.1.16"
  LIB_LVGL: "8.3.11"
  LIB_ADAFRUIT_LC709203F: "1.3.4"
  LIB_ADAFRUIT_BUSIO: "1.17.4"
  LIB_ADAFRUIT_MAX1704X: "1.0.3"
  LIB_ARDUINOJSON: "7.0.4"
  LIB_WEBSOCKETS: "2.4.1"
  LIB_ESPASYNCWEBSERVER: "3.6.0"
  LIB_ASYNCTCP: "3.3.2"
  LIB_NIMBLE_ARDUINO: "1.4.2"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create releases

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 platform (pinned)
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@${ESP32_CORE_VERSION}

      - name: Install pinned libraries
        run: |
          arduino-cli lib install "LovyanGFX@${LIB_LOVYANGFX}"
          arduino-cli lib install "lvgl@${LIB_LVGL}"
          arduino-cli lib install "Adafruit LC709203F@${LIB_ADAFRUIT_LC709203F}"
          arduino-cli lib install "Adafruit BusIO@${LIB_ADAFRUIT_BUSIO}"
          arduino-cli lib install "Adafruit MAX1704X@${LIB_ADAFRUIT_MAX1704X}"
          arduino-cli lib install "ArduinoJson@${LIB_ARDUINOJSON}"
          arduino-cli lib install "WebSockets@${LIB_WEBSOCKETS}"
          arduino-cli lib install "ESP Async WebServer@${LIB_ESPASYNCWEBSERVER}"
          arduino-cli lib install "Async TCP@${LIB_ASYNCTCP}"
          arduino-cli lib install "NimBLE-Arduino@${LIB_NIMBLE_ARDUINO}"

      - name: Place lv_conf.h next to lvgl library
        # LVGL's lv_conf_internal.h does '#include "../../lv_conf.h"' relative
        # to its src/misc/ folder, expecting the config one directory above the
        # lvgl/ library folder. Local builds satisfy this with a copy in
        # arduino-cli/user/libraries/. Mirror that here.
        run: |
          if [ ! -f lv_conf.h ]; then
            echo "ERROR: lv_conf.h not found in repo root"
            exit 1
          fi
          cp lv_conf.h ~/Arduino/libraries/lv_conf.h

      - name: Build firmware
        run: |
          # -mtext-section-literals: ESP32-S3 platform.txt sets this for
          # compiler.cpp.flags.esp32s3 but on a fresh CI install the s3 variant
          # isn't always picked up. Forcing it via --build-property avoids the
          # 'l32r: literal target out of range' link error from ArduinoJson.
          # --clean: matches the new-update local skill which warns about
          # cached object files carrying stale version strings.
          arduino-cli compile \
            --fqbn "esp32:esp32:adafruit_feather_esp32s3:CDCOnBoot=cdc,PartitionScheme=huge_app,PSRAM=enabled,FlashSize=4M,USBMode=hwcdc" \
            --build-property "compiler.cpp.extra_flags=-mtext-section-literals" \
            --output-dir build \
            --export-binaries \
            --clean \
            .

      - name: Normalize binary filenames
        working-directory: build
        run: |
          # arduino-cli emits files prefixed with "<sketch>.ino." — rename to
          # the names the flasher expects. Three explicit renames (a generic
          # for-loop with parameter expansion would map vail-summit.ino.bin
          # to "bin" instead of "vail-summit.bin").
          [ -f vail-summit.ino.bootloader.bin ] && mv vail-summit.ino.bootloader.bin bootloader.bin
          [ -f vail-summit.ino.partitions.bin ] && mv vail-summit.ino.partitions.bin partitions.bin
          [ -f vail-summit.ino.bin ]            && mv vail-summit.ino.bin            vail-summit.bin
          [ -f vail-summit.ino.merged.bin ]     && mv vail-summit.ino.merged.bin     merged.bin || true
          ls -lh

      - name: Capture firmware version + source SHA
        id: ver
        run: |
          VER=$(grep -E '^#define[[:space:]]+FIRMWARE_VERSION' src/core/config.h | sed -E 's/.*"([^"]+)".*/\1/')
          DATE=$(grep -E '^#define[[:space:]]+FIRMWARE_DATE' src/core/config.h | sed -E 's/.*"([^"]+)".*/\1/')
          SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VER:-unknown}" >> $GITHUB_OUTPUT
          echo "date=${DATE:-unknown}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}" >> $GITHUB_OUTPUT
          echo "Firmware: v$VER ($DATE) from $SHA"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vail-summit-${{ steps.ver.outputs.version }}-${{ steps.ver.outputs.short_sha }}
          path: |
            build/bootloader.bin
            build/partitions.bin
            build/vail-summit.bin
          retention-days: 30

      - name: Compose default release notes (if not provided)
        id: notes
        if: ${{ inputs.release_type != 'none' }}
        run: |
          if [ -n "${{ inputs.release_notes }}" ]; then
            echo "${{ inputs.release_notes }}" > /tmp/release_notes.md
          else
            cat > /tmp/release_notes.md <<EOF
          Vail Summit firmware v${{ steps.ver.outputs.version }} built from \`${{ github.ref_name }}\` @ \`${{ steps.ver.outputs.short_sha }}\`.

          Flash via https://update.vailadapter.com.

          ## Build provenance
          - Source: \`${{ github.repository }}\` @ \`${{ steps.ver.outputs.sha }}\`
          - Firmware date: ${{ steps.ver.outputs.date }}
          - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Assets
          - \`vail-summit.bin\` — main firmware
          - \`bootloader.bin\`
          - \`partitions.bin\`

          (Edit this body after publish to add a changelog.)
          EOF
          fi
          cat /tmp/release_notes.md

      - name: Compose release title
        id: title
        if: ${{ inputs.release_type != 'none' }}
        run: |
          if [ -n "${{ inputs.release_title }}" ]; then
            echo "title=${{ inputs.release_title }}" >> $GITHUB_OUTPUT
          else
            echo "title=v${{ steps.ver.outputs.version }} - ${{ inputs.release_type == 'prerelease' && 'Test Release' || 'Release' }}" >> $GITHUB_OUTPUT
          fi

      - name: Check if tag already exists
        id: tag_check
        if: ${{ inputs.release_type != 'none' }}
        run: |
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.ver.outputs.tag }} already exists. Will use existing tag."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.ver.outputs.tag }} does not exist. Will create it on this commit."
          fi

      - name: Create GitHub Release
        if: ${{ inputs.release_type != 'none' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build the gh release create flags
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" = "prerelease" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          TARGET_FLAG=""
          if [ "${{ steps.tag_check.outputs.exists }}" = "false" ]; then
            # Tag doesn't exist — point it at the commit we just built
            TARGET_FLAG="--target ${{ github.sha }}"
          fi

          # If a release already exists for this tag, delete it first so we
          # can re-publish (useful for iterative test builds at the same tag).
          if gh release view "${{ steps.ver.outputs.tag }}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Release ${{ steps.ver.outputs.tag }} already exists — deleting before re-publish"
            gh release delete "${{ steps.ver.outputs.tag }}" --repo ${{ github.repository }} --yes --cleanup-tag
          fi

          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo ${{ github.repository }} \
            $PRERELEASE_FLAG \
            $TARGET_FLAG \
            --title "${{ steps.title.outputs.title }}" \
            --notes-file /tmp/release_notes.md \
            build/vail-summit.bin \
            build/bootloader.bin \
            build/partitions.bin

          echo ""
          echo "Released: https://github.com/${{ github.repository }}/releases/tag/${{ steps.ver.outputs.tag }}"
          echo ""
          if [ "${{ inputs.release_type }}" = "prerelease" ]; then
            echo "This will appear as the 'Test Release' entry in the flasher dropdown at"
            echo "https://update.vailadapter.com (when 'Show test release' is checked)."
          else
            echo "This will appear as the 'Latest' entry in the flasher dropdown at"
            echo "https://update.vailadapter.com."
          fi
